<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">

<style>

/* FULL PAGE */
.profile-page {
    min-height: 100vh;
    background: #f5f5f5;
}

/* COVER */
.cover {
    height: 200px;
    background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') center/cover;
    position: relative;
}

/* PROFILE PIC */
.profile-pic {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
}

.profile-pic img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid white;
}

/* CONTENT */
.profile-content {
    margin-top: 60px;
    text-align: center;
    padding: 15px;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-around;
    margin-top: 15px;
    background: white;
    padding: 12px;
    border-radius: 12px;
}

.stat h3 {
    margin: 0;
}

.stat p {
    font-size: 12px;
    color: gray;
}

/* BUTTONS */
.actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #4CAF50;
    color: white;
}

/* SECTIONS */
.section {
    margin-top: 15px;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

/* 🔥 BACK ICON (PROFESSIONAL) */
.back-btn {
    position: fixed;
    top: 20px;
    left: 15px;
    background: white;
    padding: 10px 12px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.2);
    z-index: 1000;
}

</style>

</head>

<body>

<!-- BACK ICON -->
<a href="javascript:history.back()" class="back-btn">⬅</a>

<div class="profile-page">

<!-- COVER -->
<div class="cover">
<div class="profile-pic">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</div>
</div>

<!-- CONTENT -->
<div class="profile-content">

<h2>{{user.name}}</h2>
<p>{{user.email}}</p>

<!-- STATS -->
<div class="stats">

<div class="stat">
<h3>{{user.points}}</h3>
<p>⭐ Points</p>
</div>

<div class="stat">
<h3>12</h3>
<p>📚 Shared</p>
</div>

<div class="stat">
<h3>5</h3>
<p>📦 Requests</p>
</div>

</div>

<!-- ACTIONS -->
<div class="actions">
<button onclick="location.href='/donate'">Donate</button>
<button onclick="location.href='/search'">Search</button>
</div>

<!-- SECTIONS -->
<div class="section">
<h3>📘 About</h3>
<p>Helping others by sharing knowledge 📚</p>
</div>

<div class="section">
<h3>🚀 Activity</h3>
<p>Stay active to earn more points and climb leaderboard</p>
</div>

</div>

</div>

</body>
</html>
