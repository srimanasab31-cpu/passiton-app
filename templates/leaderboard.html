<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">

<style>

/* FULL SCREEN CENTER */
.leaderboard-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* MAIN BOX */
.leaderboard-box {
    width: 90%;
    max-width: 400px;
    text-align: center;
}

/* ROW DESIGN */
.lb-row {
    display: flex;
    justify-content: space-between;
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.08);
}

/* TOP 3 COLORS */
.lb-row.top1 { background: #fff3cd; }
.lb-row.top2 { background: #e3f2fd; }
.lb-row.top3 { background: #f5f5f5; }

/* TEXT */
.lb-name {
    flex: 1;
    text-align: left;
}

.lb-rank {
    width: 50px;
}

.lb-points {
    color: #4CAF50;
    font-weight: bold;
}

/* FLOATING BACK BUTTON */
.back-btn-floating {
    position: fixed;
    top: 20px;
    left: 15px;
    background: white;
    padding: 10px 12px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<!-- BACK BUTTON -->
<a href="javascript:history.back()" class="back-btn-floating">⬅</a>

<div class="leaderboard-page">

<div class="leaderboard-box">

<h2>🏆 Leaderboard</h2>
<p>Top contributors</p>

{% for user in users %}

<div class="lb-row 
{% if loop.index == 1 %}top1{% endif %}
{% if loop.index == 2 %}top2{% endif %}
{% if loop.index == 3 %}top3{% endif %}
">

<div class="lb-rank">
{% if loop.index == 1 %}🥇{% elif loop.index == 2 %}🥈{% elif loop.index == 3 %}🥉{% else %}#{{loop.index}}{% endif %}
</div>

<div class="lb-name">
{{user.name}}
</div>

<div class="lb-points">
⭐ {{user.points}}
</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
